name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run prek run --all-files

  test-mem-lite-mcp:
    name: Tests / mem-lite-mcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-groups
      - run: cd packages/mem-lite-mcp && uv run pytest tests/ -v

  test-agent-toys-mcp:
    name: Tests / agent-toys-mcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-groups
      - run: cd packages/agent-toys-mcp && uv run pytest tests/ -v
