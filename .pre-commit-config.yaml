repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        language: system
        entry: uv run ruff check
        args: [--fix]
        types: [python]

      - id: ruff-format
        name: ruff-format
        language: system
        entry: uv run ruff format
        types: [python]

      - id: pyrefly
        name: pyrefly
        language: system
        entry: uv run pyrefly check
        args: [packages/]
        pass_filenames: false
        types: [python]
