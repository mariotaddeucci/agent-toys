[project]
name = "agent-toys-mcp"
version = "0.1.0"
description = "Auto-discovering MCP aggregator that composes all workspace MCPs into a single connection"
readme = "README.md"
authors = [
    { name = "Mario Taddeucci", email = "mariotaddeucci@gmx.com" }
]
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=3.4.2",
]

[project.scripts]
agent-toys-mcp = "agent_toys_mcp.server:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
mem-lite-mcp = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=0.24.0",
]
full = [
    "mem-lite-mcp",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["."]
markers = [
    "asyncio: marks tests as async (deselect with '-m \"not asyncio\"')",
]
