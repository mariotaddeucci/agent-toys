[tool.uv.workspace]
members = [
    "packages/*",
]

[tool.uv]
dev-dependencies = [
    "ruff>=0.5.0",
    "pyrefly>=0.3.0",
    "pytest>=9.1.0",
    "pytest-asyncio>=0.24.0",
    "prek>=0.4.4",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
extend-select = [
    "F",
    "E",
    "W",
    "I",
    "B",
    "SIM",
    "UP",
    "ASYNC",
    "LOG",
    "RUF",
    "S",
    "EM",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/*.py" = ["S101", "S110", "ASYNC240"]
"**/tests/**/*.py" = ["S101", "S110", "ASYNC240"]
"**/server.py" = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["mem_lite_mcp", "agent_toys_mcp"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
